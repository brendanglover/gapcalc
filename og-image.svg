<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Mono:wght@400;500&amp;family=DM+Sans:wght@400;700&amp;display=swap');
      .bbn { font-family: 'Bebas Neue', sans-serif; }
      .dmm { font-family: 'DM Mono', monospace; }
      .dms { font-family: 'DM Sans', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="6" fill="#f5820a"/>
  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="#f5820a"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#f5820a" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Logo mark — GC in orange square -->
  <rect x="80" y="76" width="76" height="76" rx="14" fill="#f5820a"/>
  <text x="118" y="133" class="bbn" font-size="48" fill="#111111" text-anchor="middle" letter-spacing="2">GC</text>

  <!-- GAPCALC wordmark -->
  <text x="176" y="140" class="bbn" font-size="72" fill="#efefef" letter-spacing="6">GAPCALC</text>

  <!-- Tagline -->
  <text x="80" y="196" class="dms" font-size="18" fill="#888888" letter-spacing="3">WORKSHOP CALCULATOR FOR WELDERS &amp; MAKERS</text>

  <!-- Divider -->
  <line x1="80" y1="222" x2="1120" y2="222" stroke="#333" stroke-width="1"/>

  <!-- Row 1 pills -->
  <rect x="80" y="252" width="193" height="46" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="176" y="280" class="bbn" font-size="17" fill="#f5820a" text-anchor="middle" letter-spacing="1.5">GAP CALCULATOR</text>

  <rect x="287" y="252" width="165" height="46" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="369" y="280" class="bbn" font-size="17" fill="#f5820a" text-anchor="middle" letter-spacing="1.5">CUT LIST</text>

  <rect x="466" y="252" width="193" height="46" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="562" y="280" class="bbn" font-size="17" fill="#f5820a" text-anchor="middle" letter-spacing="1.5">WEIGHT CALC</text>

  <rect x="673" y="252" width="193" height="46" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="769" y="280" class="bbn" font-size="17" fill="#f5820a" text-anchor="middle" letter-spacing="1.5">ANGLE CUTS</text>

  <rect x="880" y="252" width="240" height="46" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="1000" y="280" class="bbn" font-size="17" fill="#f5820a" text-anchor="middle" letter-spacing="1.5">ROD ESTIMATOR</text>

  <!-- Row 2 pills -->
  <rect x="80" y="314" width="193" height="46" rx="8" fill="rgba(245,130,10,0.15)" stroke="#f5820a" stroke-width="1.5"/>
  <text x="176" y="342" class="bbn" font-size="17" fill="#f5820a" text-anchor="middle" letter-spacing="1.5">JOB COSTING</text>

  <rect x="287" y="314" width="193" height="46" rx="8" fill="#1c1c1c" stroke="#444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="383" y="332" class="dms" font-size="10" fill="#555" text-anchor="middle" letter-spacing="2">COMING SOON</text>
  <text x="383" y="350" class="bbn" font-size="15" fill="#555" text-anchor="middle" letter-spacing="1.5">BOLT SPACING</text>

  <!-- Big tagline -->
  <text x="80" y="448" class="bbn" font-size="44" fill="#efefef" letter-spacing="2">MEASURE TWICE.</text>
  <text x="80" y="500" class="bbn" font-size="44" fill="#efefef" letter-spacing="2">CUT ONCE.</text>
  <text x="80" y="552" class="bbn" font-size="44" fill="#f5820a" letter-spacing="2">BUILD COOL THINGS.</text>

  <!-- Domain -->
  <text x="1120" y="552" class="dmm" font-size="20" fill="#555" text-anchor="end" letter-spacing="1">gapcalc.com</text>

  <!-- FREE badge -->
  <rect x="1052" y="576" width="68" height="26" rx="6" fill="rgba(245,130,10,0.12)" stroke="#f5820a" stroke-width="1"/>
  <text x="1086" y="594" class="bbn" font-size="14" fill="#f5820a" text-anchor="middle" letter-spacing="2">FREE</text>

</svg>
